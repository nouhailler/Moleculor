<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Moleculor">
  <!-- Full-bleed background (maskable-safe): deep benefic green -->
  <rect width="512" height="512" fill="#2f7d5b"/>

  <!-- Molecule: benzene-style hexagonal ring of bonds, kept inside the maskable safe zone -->
  <path d="M256 144 L353 200 L353 312 L256 368 L159 312 L159 200 Z"
        fill="none" stroke="#f4f2ea" stroke-width="13" stroke-linejoin="round"/>

  <!-- Atoms -->
  <circle cx="353" cy="200" r="24" fill="#f4f2ea"/>
  <circle cx="353" cy="312" r="24" fill="#f4f2ea"/>
  <circle cx="256" cy="368" r="24" fill="#f4f2ea"/>
  <circle cx="159" cy="312" r="24" fill="#f4f2ea"/>
  <circle cx="159" cy="200" r="24" fill="#f4f2ea"/>

  <!-- Accent atom (watch terracotta) — echoes the app's benefic / surveiller duality -->
  <circle cx="256" cy="144" r="27" fill="#c0633f"/>
</svg>
